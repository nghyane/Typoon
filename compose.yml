name: typoon

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-typoon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typoon}
      POSTGRES_DB:       ${POSTGRES_DB:-typoon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-typoon} -d $${POSTGRES_DB:-typoon}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
