[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "typoon-stages"
version         = "0.1.0"
description     = "Typoon stages — use-case orchestration, sources, I/O adapters"
requires-python = ">=3.11"
dependencies = [
  "typoon-core",
  "typoon-vision",
  "img2pdf>=0.5",
  "httpx>=0.27",
  "bunle",
]

[tool.hatch.build.targets.wheel]
packages = ["typoon"]
