[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "typoon-llm"
version         = "0.1.0"
description     = "Typoon LLM — provider-agnostic IR, agent loop, native adapters"
requires-python = ">=3.11"
dependencies = [
  "typoon-core",
  "httpx>=0.27",
  "anthropic>=0.34",
  "openai>=1.40",
  "google-genai>=0.3",
]

[project.optional-dependencies]
gemini_web = ["gemini-webapi>=1.13", "browser-cookie3>=0.20"]

[tool.hatch.build.targets.wheel]
packages = ["typoon"]
