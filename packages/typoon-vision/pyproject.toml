[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "typoon-vision"
version         = "0.1.0"
description     = "Typoon vision — text detection, OCR, grouping, erasing"
requires-python = ">=3.11"
dependencies = [
  "typoon-core",
  "onnxruntime>=1.17",
  "chrome-lens-py>=2.0",
]

[project.optional-dependencies]
cuda      = ["onnxruntime-gpu>=1.17"]
mangaocr  = ["transformers>=4.45", "fugashi", "unidic-lite"]
apple     = ["coremltools>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["typoon"]
