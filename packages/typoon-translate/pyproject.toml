[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "typoon-translate"
version         = "0.1.0"
description     = "Typoon translate — LLM-driven brief, page translation, chapter translate"
requires-python = ">=3.11"
dependencies = [
  "typoon-core",
  "typoon-stages",
  "typoon-llm",
]

[tool.hatch.build.targets.wheel]
packages = ["typoon"]

[tool.hatch.build.targets.wheel.force-include]
"typoon/stages/prompts" = "typoon/stages/prompts"
