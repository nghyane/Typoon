[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "typoon-core"
version         = "0.1.0"
description     = "Typoon core — domain types, run artifacts, config, paths"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.4",
  "numpy>=1.26",
  "opencv-python-headless>=4.10",
  "Pillow>=10.4",
]

[tool.hatch.build.targets.wheel]
packages = ["typoon"]
