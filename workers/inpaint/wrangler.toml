name = "typoon-inpaint"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[placement]
mode = "smart"

[durable_objects]
bindings = [
  { name = "INPAINT_CONTAINER", class_name = "InpaintContainer" },
  { name = "FAN_IN", class_name = "FanInCounterDO", script_name = "typoon-pipeline" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["INPAINT_CONTAINER"]

[[containers]]
class_name    = "InpaintContainer"
image         = "../../crates/inpaint/Dockerfile"
max_instances = 30
instance_type = "basic"

[[queues.consumers]]
queue             = "typoon-inpaint-queue"
max_batch_size    = 1
max_batch_timeout = 5
max_retries       = 3
dead_letter_queue = "typoon-inpaint-dlq"
max_concurrency   = 250

[[r2_buckets]]
binding     = "R2"
bucket_name = "typoon-work"

[[services]]
binding    = "PIPELINE_WORKER"
service    = "typoon-pipeline"
entrypoint = "PipelineNotifier"

[vars]
MAX_INSTANCES = "30"
