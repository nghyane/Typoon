name = "typoon-inpaint"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[placement]
mode = "smart"

[durable_objects]
bindings = [
  { name = "INPAINT_CONTAINER", class_name = "InpaintContainer" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["INPAINT_CONTAINER"]

[[containers]]
class_name    = "InpaintContainer"
image         = "registry.cloudflare.com/818e551312970df676abe1a0e61819c7/typoon-inpaint-inpaintcontainer:probe1779457940"
# Probe (POST /bench) showed Candle CPU is the entire bottleneck:
#   basic       (1/4 vCPU) → ~33 s/tile, ~70 s/page
#   standard-2  (1 vCPU)   → ~8.5 s/tile, ~19 s/page
#   standard-4  (4 vCPU)   → ~3.5 s/tile, ~11 s/page serial, ~5.8 s/page at C=4
#
# Architecture: pipeline shards a chapter across `max_instances` shards
# (one /inpaint-chapter request per shard) and each container runs its
# pages with in-instance concurrency=4 to saturate the 4 vCPU budget.
# Empirical wall time for a 70-page chapter: ~70s at 6×standard-4×C=4.
max_instances = 6
instance_type = "standard-4"

[vars]
MAX_INSTANCES  = "6"
R2_ACCOUNT_ID  = "818e551312970df676abe1a0e61819c7"
R2_BUCKET_NAME = "typoon-work"
# Secrets (set via `wrangler secret put`):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
