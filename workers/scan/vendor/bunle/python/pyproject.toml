[build-system]
requires = ["maturin>=1.5,<2"]
build-backend = "maturin"

[project]
name = "bunle"
version = "0.1.0"
description = "Python bindings for the Bunle image container format"
license = { text = "MIT" }
authors = [{ name = "nghyane" }]
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
]

[tool.maturin]
manifest-path = "Cargo.toml"
module-name = "bunle"
features = ["pyo3/extension-module"]
