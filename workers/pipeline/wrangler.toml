name = "typoon-pipeline"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# v1 created FanInCounterDO. v2 deletes it — coordination is now native
# workflow `step.do` + `Promise.all` (see workers/pipeline/src/pipeline.ts).
[[migrations]]
tag                = "v1"
new_sqlite_classes = ["FanInCounterDO"]

[[migrations]]
tag             = "v2"
deleted_classes = ["FanInCounterDO"]

[[services]]
binding    = "SCAN"
service    = "typoon-scan"
entrypoint = "ScanService"

[[services]]
binding    = "MEDIA"
service    = "typoon-media"
entrypoint = "MediaService"

[[services]]
binding    = "BRIEF"
service    = "typoon-brief"
entrypoint = "BriefService"

[[services]]
binding    = "TRANSLATE"
service    = "typoon-translate"
entrypoint = "TranslateService"

[[services]]
binding    = "INPAINT"
service    = "typoon-inpaint"
entrypoint = "InpaintService"

[[services]]
binding    = "TYPESET_PACK"
service    = "typoon-typeset-pack"
entrypoint = "TypesetPackService"

[[services]]
binding    = "API"
service    = "typoon-api"
entrypoint = "PipelineCallback"

[[r2_buckets]]
binding     = "R2"
bucket_name = "typoon-work"

[[workflows]]
name       = "chapter-pipeline"
binding    = "PIPELINE"
class_name = "ChapterPipeline"
