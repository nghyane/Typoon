models_dir = "models"
default_target_lang = "vi"

[providers.openai]
type = "openai"
endpoint = "http://localhost:7860/api/provider/openai/v1"

[providers.anthropic]
type = "anthropic"
endpoint = "http://localhost:7860/api/provider/anthropic/v1"

[translation]
provider = "openai"
model = "gpt-5.4"
reasoning_effort = "low"

[context_agent]
provider = "anthropic"
model = "claude-haiku-4-5"

[context]
db_path = "data/context.db"

[glossary]
db_path = "data/glossary.db"
