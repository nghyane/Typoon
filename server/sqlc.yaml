version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_params_struct_pointers: true
        emit_methods_with_db_argument: true
