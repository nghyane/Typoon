name = "typoon-translate"
account_id = "818e551312970df676abe1a0e61819c7"
main = "src/index.ts"
compatibility_date = "2026-01-01"

limits = { cpu_ms = 30000 }

[[r2_buckets]]
binding     = "R2"
bucket_name = "typoon-work"

[vars]
PACKY_ENDPOINT = "https://www.packyapi.com/v1/responses"
PACKY_MODEL    = "gpt-5.4-mini"

[[rules]]
type     = "Text"
globs    = ["**/*.md", "**/*.txt"]
fallthrough = false
