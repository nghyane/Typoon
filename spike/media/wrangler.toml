name = "typoon-media"
account_id = "818e551312970df676abe1a0e61819c7"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[placement]
mode = "smart"

[durable_objects]
bindings = [
  { name = "MEDIA_CONTAINER", class_name = "MediaContainer" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MediaContainer"]

[[containers]]
class_name    = "MediaContainer"
image         = "./Dockerfile"
max_instances = 20
instance_type = "basic"

# R2 binding only needed for zip_key source reads (raw ZIP input).
# All prepared/render key I/O done by container via FUSE.
[[r2_buckets]]
binding     = "R2"
bucket_name = "typoon-work"

[vars]
MAX_INSTANCES  = "20"
R2_BUCKET_NAME = "typoon-work"
R2_ACCOUNT_ID  = "818e551312970df676abe1a0e61819c7"
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY → wrangler secret put
